version: 2

updates:
  # ── npm packages ────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    # Group minor/patch bumps to reduce PR noise — majors get individual PRs
    groups:
      typescript-tooling:
        patterns: ["typescript", "turbo", "@types/*", "tsup"]
        update-types: ["minor", "patch"]
      jest:
        patterns: ["jest*", "ts-jest", "jest-mock-extended"]
        update-types: ["minor", "patch"]
    ignore:
      # Major bumps require manual review — they may break Node/TS compat
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ───────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Bogota
    open-pull-requests-limit: 5
