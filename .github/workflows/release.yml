name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write      # create tags, commits, and GitHub Releases
  pull-requests: write # open the "Version Packages" PR
  packages: write      # publish to GitHub Packages

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so changesets can diff versions across commits.
          # NOTE: use a PAT (repo + workflow scopes) instead of GITHUB_TOKEN
          # if you want the "Version Packages" PR to trigger CI workflows.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          # Points npm publish commands to GitHub Packages for @davyonix-company
          registry-url: https://npm.pkg.github.com
          scope: '@davyonix-company'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build

      # How this works:
      #   - If unmerged changesets exist on main → opens/updates "Version Packages" PR
      #     that bumps versions and updates CHANGELOG.md files.
      #   - If the "Version Packages" PR is merged → publishes changed packages
      #     to GitHub Packages and creates GitHub Releases.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run publish-packages
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
